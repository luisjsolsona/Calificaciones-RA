name: cuaderno-calificaciones-ra

services:
  cuaderno:
    build:
      context: .
    ports:
      - target: 80
        published: "8000"
        protocol: tcp
    restart: unless-stopped
    network_mode: bridge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: cuaderno
  scheme: http
  index: /
  port_map: "8000"
  title:
    en_us: Cuaderno Calificaciones RA
    es_es: Cuaderno Calificaciones RA
  tagline:
    en_us: FP Gradebook — Learning Outcomes
    es_es: Cuaderno de calificaciones para Formación Profesional
  description:
    en_us: |
      Gradebook for Spanish Vocational Training (Formación Profesional).
      Manage Learning Outcomes (RAs), Didactic Units, Activities and Exams
      with automatic weighted grade calculation, charts and per-student reports.
      Import/export data as JSON or plain semicolon-separated text.
      Data is saved automatically in the browser (localStorage).
    es_es: |
      Cuaderno de calificaciones para Formación Profesional.
      Gestiona Resultados de Aprendizaje, Unidades Didácticas, Actividades y
      Exámenes con cálculo automático ponderado, gráficos e informes por alumno.
      Importa/exporta datos como JSON o texto plano separado por punto y coma.
      Los datos se guardan automáticamente en el navegador.
  category: Education
  developer: luisjsolsona
  author: luisjsolsona
  icon: https://raw.githubusercontent.com/luisjsolsona/Calificaciones-RA/main/icon.svg
  screenshot_link: []
  thumbnail: https://raw.githubusercontent.com/luisjsolsona/Calificaciones-RA/main/icon.svg
