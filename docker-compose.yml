name: cuaderno-calificaciones-ra

services:
  cuaderno:
    build:
      context: .
    ports:
      - "8500:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=cuaderno_jwt_secret_2024_cambiame
      - DB_PATH=/data/calificaciones.db
    volumes:
      - db-data:/data
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db-data:

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: cuaderno
  scheme: http
  index: /
  port_map: "8500"
  title:
    en_us: Cuaderno Calificaciones RA
    es_es: Cuaderno Calificaciones RA
  tagline:
    en_us: FP Gradebook — Learning Outcomes
    es_es: Cuaderno de calificaciones para Formacion Profesional
  description:
    en_us: Gradebook for Spanish Vocational Training with multi-user backend.
    es_es: Cuaderno de calificaciones para FP con backend multiusuario.
  category: Education
  developer: luisjsolsona
  author: luisjsolsona
  icon: https://raw.githubusercontent.com/luisjsolsona/Calificaciones-RA/main/icon.svg
